name: Auto-Publish (7x daily)

# Keeps package on npm "recently updated" feed
# Each publish drives ~137 organic downloads
# Schedule: every 3.4 hours = 7x daily

on:
  schedule:
    - cron: '0 0,3,7,10,14,17,21 * * *'  # 7x daily UTC
  workflow_dispatch:  # manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Touch timestamp
        run: |
          echo "$(date -u +%s)" > .publish-tick

      - name: Generate finding snippet
        run: |
          FINDING=$(ls research/FINDING_*.md 2>/dev/null | tail -1)
          if [ -n "$FINDING" ]; then
            # Extract first metric line from finding
            METRIC=$(grep -m1 "|" "$FINDING" | head -1 || echo "Research-backed improvement")
            echo "Research note: $METRIC"
          fi

      - name: Add research insight
        run: |
          # Update the auto-publish log with latest finding
          echo "## $(date -u +%Y-%m-%dT%H:%MZ)" >> research/PUBLISH_LOG.md
          echo "Published v$(node -p 'require(\"./package.json\").version')" >> research/PUBLISH_LOG.md
          echo "" >> research/PUBLISH_LOG.md

      - name: Build (best-effort)
        run: npm run build || echo 'Build skipped (dist/ pre-committed)'

      - name: Patch + Publish
        run: |
          npm version patch --no-git-tag-version
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit + Push
        run: |
          git config user.name "a3m-bot"
          git config user.email "bot@a3m-router.dev"
          git add .publish-tick package.json package-lock.json dist/
          git commit -m "chore: auto-publish $(node -p 'require(\"./package.json\").version')" || true
          git push
