# A3M Router — GitHub Pages Configuration
# https://das-rebel.github.io/a3m-router/

title: A3M Router
tagline: #1 LLM Routing Benchmark & Cheapest Router with Memory — 47+ providers, RouterArena 76.43, $0.047/1K queries
description: >-
  #1 LLM routing benchmark & cheapest router with memory. A3M Router scores 76.43
  on RouterArena, costs $0.047/1K queries, and runs 47+ providers in parallel
  with ensemble voting. Semantic cache, budget enforcement, circuit breaker.
  Start in <100ms. Zero ML, 19.5KB.
url: "https://das-rebel.github.io"
baseurl: "/a3m-router"

# GitHub Pages settings
lsi: false
safe: true
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
highlighter: rouge
permalink: pretty

# SEO
author: Subhajit Das
lang: en
social:
  name: A3M Router
  links:
    - https://github.com/Das-rebel/a3m-router
    - https://www.npmjs.com/package/adaptive-memory-multi-model-router

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /a3m-router/benchmark-chart.png

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - BENCHMARK.md
  - "*.md"
